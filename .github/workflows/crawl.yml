name: SEEgle Crawl

on:
  schedule:
    - cron: "0 */6 * * *"
  workflow_dispatch:

jobs:
  crawl:
    runs-on: ubuntu-latest

    env:
      WORKER_URL: ${{ secrets.WORKER_URL }}
      SEEGLE_INGEST_SECRET: ${{ secrets.SEEGLE_INGEST_SECRET }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - run: pip install requests beautifulsoup4

      - run: python main.py
